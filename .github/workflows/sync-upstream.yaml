name: Sync with Upstream Repository

on:
  # Runs on a schedule (every 6 hours)
  schedule:
    - cron: '0 */6 * * *'
  
  # Manual trigger
  workflow_dispatch:
  
  # Test since this action is not yet merged so we cannot workflow_dispatch it and schedule will not work until it is merged.
  # But we can test it by pushing to this branch.
  push:

jobs:
  sync:
    name: Sync with upstream repository
    runs-on: ubuntu-latest
    strategy:
      matrix: 
        base_branch: 
          - humble
          - jazzy

    steps:
      - name: Generate token
        id: generate-token
        uses: tibdex/github-app-token@v1
        with:
          app_id: ${{ secrets.APP_ID }}
          private_key: ${{ secrets.PRIVATE_KEY }}
      
      - name: Run sync-branches
        uses: autowarefoundation/autoware-github-actions/sync-branches@v1
        with:
          token: ${{ steps.generate-token.outputs.token }}
          base-branch: ${{ matrix.base_branch }}
          sync-pr-branch: sync-upstream-${{ matrix.base_branch }}
          sync-target-repository: https://github.com/ros2/rclcpp.git
          sync-target-branch: ${{ matrix.base_branch }}
          pr-title: "chore: sync upstream ${{ matrix.base_branch }}"
          pr-labels: |
            bot
            sync-upstream
          auto-merge-method: merge